<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<meta name="theme-color" content="#0f766e">
<title>HSK 1 Reading Challenge · 10 Soal (Offline)</title>
<style>
    :root {
        --primary: #0f766e;
        --primary-dark: #312e81;
        --accent: #84cc16;
        --bg-soft: #eef2ff;
        --text-color: #1e1b3a;
        --border-color: #d8dcf0;
        --ok: #059669;
        --bad: #dc2626;
        --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg,#f0fdf4 0%,#ecfeff 100%);
        margin: 0; padding: 0; color: var(--text-color);
        user-select: none !important; -webkit-user-select: none !important;
    }
    header {
        background: linear-gradient(120deg, var(--primary) 0%, var(--accent) 130%);
        color: white; padding: 16px 22px; display: flex; justify-content: space-between;
        align-items: center; flex-wrap: wrap; gap: 8px; position: fixed; top: 0; width: 100%;
        box-sizing: border-box; z-index: 1000; box-shadow: 0 4px 18px rgba(67,56,202,0.35);
    }
    header .title { font-weight: 700; font-size: 18px; }
    header .timer-box { font-size: 17px; font-weight: bold; background: rgba(255,255,255,0.18); padding: 6px 16px; border-radius: 999px; }

    .container {
        max-width: 720px; margin: 96px auto 40px auto; background: #ffffff; padding: 32px;
        border-radius: 20px; box-shadow: 0 10px 40px rgba(67,56,202,0.10);
    }

    .login-screen {
        max-width: 420px; margin: 100px auto; background: #ffffff; padding: 40px 36px;
        border-radius: 22px; box-shadow: 0 15px 45px rgba(67,56,202,0.18); text-align: center;
        border-top: 6px solid var(--primary);
    }
    .login-screen h2 { color: var(--primary-dark); margin-bottom: 6px; }
    .login-screen p.sub { color: #6b7280; margin-bottom: 26px; font-size: 14px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary-dark); font-size: 14px; }
    .form-group input {
        width: 100%; padding: 13px 14px; border: 1.5px solid var(--border-color);
        border-radius: 10px; box-sizing: border-box; font-size: 16px;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); }

    .btn {
        background: linear-gradient(120deg, var(--primary), var(--accent));
        color: white; padding: 13px 25px; border: none; border-radius: 999px;
        cursor: pointer; font-size: 16px; font-weight: 700; width: 100%;
        transition: transform .12s, box-shadow .12s; box-shadow: 0 6px 18px rgba(67,56,202,0.30);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(67,56,202,0.35); }

    .exam-info {
        background: var(--bg-soft); padding: 16px 18px; border-radius: var(--radius);
        margin-bottom: 26px; line-height: 1.6; border: 1px solid #dfe3fb;
    }

    .question-block {
        padding: 20px 18px; margin: 14px 0; background: #fbfbff;
        border: 1px solid #e5e7f7; border-radius: var(--radius);
        box-shadow: 0 2px 8px rgba(30,27,58,0.03);
    }
    .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .question-text { font-size: 18px; font-weight: 500; margin-bottom: 10px; line-height: 1.6; }

    .flag-btn { background: #eef0fb; border: 1px solid #cfd4f5; color: var(--primary-dark); padding: 6px 14px; border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 700; }
    .flag-btn.flagged { background: #f59e0b; color: white; border-color: #d97706; }

    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
    .option-label {
        display: flex; align-items: center; padding: 11px 12px; border: 1.5px solid var(--border-color);
        border-radius: 10px; cursor: pointer; transition: 0.15s; background: #fff;
    }
    .option-label:hover { background-color: #f4f5ff; border-color: var(--primary); }
    .option-label input { margin-right: 10px; transform: scale(1.2); accent-color: var(--primary); }

    .hidden { display: none !important; }

    .result-card { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #e5e7f7; }
    .result-card.correct { background: #ecfdf5; border-color: #a7f3d0; }
    .result-card.wrong { background: #fef2f2; border-color: #fecaca; }
    .score-box { display: flex; gap: 16px; flex-wrap: wrap; margin: 22px 0; }
    .score-pill { flex: 1; min-width: 150px; background: var(--bg-soft); border-radius: 16px; padding: 18px; text-align: center; border: 1px solid #dfe3fb; }
    .score-pill .num { font-size: 30px; font-weight: 800; background: linear-gradient(120deg, var(--primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .nav-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin: 18px 0; }
    .nav-item { height: 34px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 700; color: var(--primary-dark); }
    .nav-item.answered { background-color: var(--ok) !important; color: white !important; border-color: #047857 !important; }
    .nav-item.flagged { background-color: #f59e0b !important; color: white !important; border-color: #d97706 !important; }

    @media (max-width: 600px) {
        .container { margin: 84px 10px 20px 10px; padding: 18px; border-radius: 16px; }
        .login-screen { margin: 20px auto; padding: 28px 20px; max-width: 100%; box-shadow: none; min-height: 100vh; box-sizing: border-box; border-radius: 0; border-top: none; }
        .question-text { font-size: 16px; }
        .options { grid-template-columns: 1fr; gap: 8px; }
        .option-label { padding: 12px 10px; font-size: 15px; }
        .option-label input { transform: scale(1.4); margin-right: 12px; }
        .nav-grid { grid-template-columns: repeat(5, 1fr); }
        .btn { font-size: 15px; padding: 14px; }
    }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <h2>HSK 1 Reading Challenge</h2>
    <p class="sub">10 soal Reading saja · 100% offline di perangkat Anda.</p>
    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="student-name" placeholder="Tulis nama Anda" autocomplete="off">
    </div>
    <button class="btn" id="btn-login" onclick="startExam()">Mulai Kuis 🚀</button>
</div>

<header id="exam-header" class="hidden">
    <div class="title">HSK 1 Reading Challenge</div>
    <div>Peserta: <span id="display-name"></span></div>
    <div class="timer-box">⏱ <span id="timer">10:00</span></div>
</header>

<div id="exam-container" class="container hidden">
    <div class="exam-info">
        <strong>📝 Petunjuk:</strong> 10 soal Reading (Benar/Salah &amp; Pilihan Ganda). Tidak ada Listening maupun Writing.
    </div>
    <div class="nav-grid" id="nav-grid-container"></div>
    <form id="exam-form">
        <div id="questions-wrapper"></div>
        <br>
        <button type="button" class="btn" style="background:linear-gradient(120deg,#059669,#84cc16); font-size: 18px; padding: 16px;" onclick="submitExam()">✅ Kumpulkan Jawaban</button>
    </form>
</div>

<div id="result-container" class="container hidden"></div>

<script>
/* ===================== DATA SOAL (10 Soal Reading Saja) ===================== */
const questions = [
    {q:1, type:"tf", t:"现在是四点二十，哥哥打篮球打了四十分钟。 # 哥哥三点四十开始打球", ans:"对"},
    {q:2, type:"tf", t:"我喜欢红色，不喜欢蓝色。 # 我喜欢蓝色", ans:"不对"},
    {q:3, type:"tf", t:"今天下雨，我们不能去公园。 # 今天天气不好", ans:"对"},
    {q:4, type:"tf", t:"妹妹会游泳，也会打网球。 # 妹妹只会游泳", ans:"不对"},
    {q:5, type:"mc", t:"你__喜欢什么颜色？", a:"什么", b:"谁", c:"哪儿", d:"几", ans:"A"},
    {q:6, type:"mc", t:"现在__点？", a:"几", b:"多少", c:"谁", d:"哪", ans:"A"},
    {q:7, type:"mc", t:"他__高兴，因为今天是他的生日。", a:"很", b:"不", c:"也", d:"都", ans:"A"},
    {q:8, type:"mc", t:"数字 45.60元 dibaca...", a:"四十五块六毛", b:"四十五块六分", c:"四块五十六毛", d:"四十五毛六块", ans:"A"},
    {q:9, type:"mc", t:"邮局在银行______。 (kata yang tepat menyatakan \"di samping\")", a:"旁边", b:"对面", c:"中间", d:"里边", ans:"A"},
    {q:10, type:"mc", t:"Terjemahkan ke dalam bahasa Mandarin: \"Ada toko buku di dalam sekolah\"", a:"学校里有一个书店", b:"书店里有一个学校", c:"学校在书店里边", d:"书店在学校后边", ans:"A"}
];

const TOTAL_QUESTIONS = questions.length;
let totalDuration = 10 * 60; // 10 menit
let countdownTimer;
let studentName = "";
let examStarted = false;

function buildHeaderHTML(qNum) {
    return `<div class="question-header">
                <strong>Soal No. ${qNum}</strong>
                <button type="button" class="flag-btn" id="flag-${qNum}" onclick="toggleFlag(${qNum})">⭐ Tandai</button>
            </div>`;
}

function initQuestions() {
    let html = "";
    questions.forEach(item => {
        if (item.type === "tf") {
            const parts = item.t.split('#');
            html += `<div class="question-block" id="block-${item.q}">
                        ${buildHeaderHTML(item.q)}
                        <div class="question-text">
                            <div style="background:#eef2ff; padding:12px 14px; border-left:4px solid var(--primary); border-radius:8px; font-size:17px; margin-bottom:10px;">${parts[0].trim()}</div>
                            ${parts[1] ? `<div style="background:#fffbeb; padding:10px 14px; border-left:4px solid #f59e0b; border-radius:8px; font-size:15px; color:#78350f;"><strong>Pernyataan:</strong> ${parts[1].trim()}</div>` : ''}
                        </div>
                        <div class="options">
                            <label class="option-label"><input type="radio" name="q${item.q}" value="对" onchange="markAnswered(${item.q})"> 对 (Benar)</label>
                            <label class="option-label"><input type="radio" name="q${item.q}" value="不对" onchange="markAnswered(${item.q})"> 不对 (Salah)</label>
                        </div>
                     </div>`;
        } else {
            html += `<div class="question-block" id="block-${item.q}">
                        ${buildHeaderHTML(item.q)}
                        <div class="question-text">${item.t}</div>
                        <div class="options" style="grid-template-columns: 1fr;">
                            <label class="option-label"><input type="radio" name="q${item.q}" value="A" onchange="markAnswered(${item.q})"> A. ${item.a}</label>
                            <label class="option-label"><input type="radio" name="q${item.q}" value="B" onchange="markAnswered(${item.q})"> B. ${item.b}</label>
                            <label class="option-label"><input type="radio" name="q${item.q}" value="C" onchange="markAnswered(${item.q})"> C. ${item.c}</label>
                            <label class="option-label"><input type="radio" name="q${item.q}" value="D" onchange="markAnswered(${item.q})"> D. ${item.d}</label>
                        </div>
                     </div>`;
        }
    });
    document.getElementById('questions-wrapper').innerHTML = html;

    let gridHtml = "";
    for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
        gridHtml += `<div class="nav-item" id="nav-item-${i}" onclick="scrollToQuestion(${i})">${i}</div>`;
    }
    document.getElementById('nav-grid-container').innerHTML = gridHtml;
}

function scrollToQuestion(qNum) {
    document.getElementById(`block-${qNum}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function markAnswered(qNum) { document.getElementById(`nav-item-${qNum}`).classList.add('answered'); }
function toggleFlag(qNum) {
    document.getElementById(`flag-${qNum}`).classList.toggle('flagged');
    document.getElementById(`nav-item-${qNum}`).classList.toggle('flagged');
}

function startExam() {
    studentName = document.getElementById('student-name').value.trim();
    if (!studentName) {
        alert("Silakan isi nama Anda terlebih dahulu.");
        return;
    }
    document.getElementById('display-name').innerText = studentName;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('exam-header').classList.remove('hidden');
    document.getElementById('exam-container').classList.remove('hidden');

    examStarted = true;
    initQuestions();
    startTimer();
}

function startTimer() {
    countdownTimer = setInterval(() => {
        totalDuration--;
        let mins = Math.floor(totalDuration / 60);
        let secs = totalDuration % 60;
        document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        if (totalDuration <= 0) {
            clearInterval(countdownTimer);
            alert("Waktu habis! Jawaban akan otomatis dikumpulkan.");
            submitExam(true);
        }
    }, 1000);
}

function submitExam(isAuto) {
    if (!isAuto && !confirm("Yakin ingin mengumpulkan jawaban sekarang?")) return;

    clearInterval(countdownTimer);
    document.getElementById('exam-header').classList.add('hidden');
    document.getElementById('exam-container').classList.add('hidden');

    const formData = new FormData(document.getElementById('exam-form'));

    let correct = 0;
    let detailHtml = "";
    questions.forEach(item => {
        const userAns = (formData.get(`q${item.q}`) || "-").trim();
        const isCorrect = userAns === item.ans;
        if (isCorrect) correct++;
        detailHtml += `<div class="result-card ${isCorrect ? 'correct' : 'wrong'}">
                <strong>Soal ${item.q}</strong> — Jawaban Anda: <strong>${userAns}</strong> ${isCorrect ? '✅' : `❌ (Jawaban benar: <strong>${item.ans}</strong>)`}
            </div>`;
    });

    const resultHtml = `
        <h2 style="color:var(--primary-dark);">✅ Hasil Kuis — ${studentName}</h2>
        <p style="color:#6b7280;">Kuis ini berjalan offline; hasil hanya tampil di layar ini.</p>
        <div class="score-box">
            <div class="score-pill"><div class="num">${correct}/${TOTAL_QUESTIONS}</div>Skor Benar</div>
            <div class="score-pill"><div class="num">${Math.round((correct/TOTAL_QUESTIONS)*100)}</div>Nilai (skala 100)</div>
        </div>
        ${detailHtml}
        <br>
        <button type="button" class="btn" onclick="location.reload()">Ulangi Kuis</button>
    `;

    const resultContainer = document.getElementById('result-container');
    resultContainer.innerHTML = resultHtml;
    resultContainer.classList.remove('hidden');
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
